<div class="login-wrap">
  <div class="login-card">
    <h1 class="brand">Secure<span class="accent">Doc</span></h1>
    <p class="subtitle">Document Intelligence Platform</p>

    @if (error()) {
      <div class="error-banner">{{ error() }}</div>
    }

    <label class="field-label">Email</label>
    <input class="field" type="email" [(ngModel)]="email" placeholder="admin@gmail.com" />

    <label class="field-label">Password</label>
    <input class="field" type="password" [(ngModel)]="password"
           placeholder="••••••••" (keyup.enter)="submit()" />

    <button class="btn-primary" (click)="submit()" [disabled]="loading()">
      {{ loading() ? 'Signing in…' : 'Sign in' }}
    </button>
  </div>
</div>
